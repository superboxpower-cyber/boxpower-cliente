<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecionando... | BoxPower</title>
    <!-- Redireciona para o portal unificado em 2 segundos -->
    <meta http-equiv="refresh" content="2;url=https://superboxpower-cyber.github.io/area_do_cliente/">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background: #04070F; 
            color: #FFF; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            text-align: center; 
        }
        .ambient { position: fixed; inset: 0; background: radial-gradient(circle at 50% 10%, rgba(16,185,129,0.1), transparent 50%); z-index: -1; pointer-events: none; }
        .box { 
            background: rgba(10,15,28,0.92); 
            border: 1px solid rgba(255,255,255,0.09); 
            padding: 40px; 
            border-radius: 28px; 
            max-width: 420px; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.7), 0 0 0 1px rgba(16,185,129,0.08); 
            backdrop-filter: blur(30px);
            animation: popIn 0.5s cubic-bezier(.4,0,.2,1);
        }
        @keyframes popIn{from{opacity:0;transform:scale(0.94) translateY(14px)}to{opacity:1;transform:none}}
        h1 { margin-bottom: 10px; font-weight: 800; font-size: 1.6rem; letter-spacing: -0.03em; }
        p { color: #8899BB; font-size: 0.95rem; margin-bottom: 30px; line-height: 1.6; }
        .btn { 
            display: inline-flex; 
            align-items: center;
            justify-content: center;
            padding: 0 24px; 
            height: 50px;
            width: 100%;
            background: linear-gradient(135deg, #059669, #7C3AED); 
            color: #fff; 
            text-decoration: none; 
            border-radius: 14px; 
            font-weight: 700; 
            font-size: 0.95rem;
            letter-spacing: 0.04em; 
            box-shadow: 0 8px 28px rgba(5,150,105,0.4), inset 0 1px 0 rgba(255,255,255,0.15); 
            transition: all 0.2s; 
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(5,150,105,0.5); }
        img { width: 88px; height: 88px; object-fit: cover; border-radius: 24px; margin-bottom: 24px; border: 1px solid rgba(16,185,129,0.35); box-shadow: 0 0 40px rgba(16,185,129,0.2); }
        .loader { 
            width: 34px; 
            height: 34px; 
            border: 3px solid rgba(255,255,255,0.1); 
            border-top-color: #10B981; 
            border-radius: 50%; 
            margin: 0 auto 20px; 
            animation: spin 1s infinite linear; 
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="ambient"></div>
    <div class="box">
        <img src="https://i.ibb.co/6JP034RZ/Whats-App-Image-2026-01-30-at-18-18-51.jpg" alt="Logo Hub">
        <div class="loader"></div>
        <h1>Portal Migrado</h1>
        <p>A Área do Cliente está de casa nova. Faremos o seu redirecionamento automático em poucos instantes...</p>
        <a href="https://superboxpower-cyber.github.io/area_do_cliente/" class="btn">ACESSAR O NOVO PORTAL</a>
    </div>
</body>
</html>
